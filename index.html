<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Control Finanzas</title>

    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="estilos.css">
</head>
<body>
<div class="login-container">
    <div class="card">
        <h1>Bienvenido</h1>
        <p>Administra tus ingresos y gastos fácilmente</p>

        <form id="inicioForm">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Ingrese su nombre" required>

            <label for="balanceInicial">Balance Inicial</label>
            <input type="number" id="balanceInicial" placeholder="Ingrese su balance" min="0" required>

            <button type="submit">Iniciar</button>
        </form>
    </div>
</div>


<script src="script.js"></script>
</body>
</html>
