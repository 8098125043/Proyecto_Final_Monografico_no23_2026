<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Transacción</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="transacion.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="menu.html" class="logo">💰 Finanzas</a>
    </div>

    <div class="nav-links">
        <a href="menu.html">Inicio</a>

        <a href="historial.html">Historial</a>
    </div>

    <div class="nav-right">
        <span>Balance: <span id="balanceActual">RD$ 0.00</span></span>
    </div>
</nav>


<div class="form-container">
    <div class="card">
        <h1 id="tituloTransaccion">Nueva Transacción</h1>
        <p>Registra tu movimiento financiero</p>

        <form id="transaccionForm">

            <label for="fecha">Fecha</label>
            <input type="date" id="fecha" required>

            <label for="concepto">Concepto</label>
            <input 
                type="text" 
                id="concepto" 
                placeholder="Ej: Pago de luz" 
                required
            >

            <label for="monto">Monto</label>
            <input 
                type="number" 
                id="monto" 
                placeholder="Ingrese el monto" 
                min="1"
                step="0.01"
                required
            >

            <button type="submit">Guardar Transacción</button>

        </form>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
